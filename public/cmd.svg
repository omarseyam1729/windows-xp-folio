<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- terminal window body -->
  <rect x="4.5" y="8" width="39" height="32" rx="2.5" fill="#000000" stroke="#e6e6e6" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="6" y="9.5" width="36" height="5" rx="1" fill="#1f4f8f"/>
  <!-- prompt text -->
  <text x="8.5" y="30" font-family="Consolas, 'Courier New', monospace" font-size="10" font-weight="bold" fill="#f2f2f2">C:\&gt;</text>
  <!-- blinking cursor block -->
  <rect x="27" y="23" width="5" height="9" fill="#d0d0d0"/>
</svg>
